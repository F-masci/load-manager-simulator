name: Run verification tests

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # Download the repository code to the runner
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up Java 26 using the official GitHub Action for Java
      - name: Set up JDK 26
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: 'temurin'
          cache: 'maven'

      # Run the tests using Maven, cleaning the project first to ensure a fresh build.
      # Use --batch-mode to reduce the amount of output and speed up the build
      - name: Run Tests
        run: mvn --batch-mode clean test